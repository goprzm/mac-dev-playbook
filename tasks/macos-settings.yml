---
- name: Set mouse tracking speed (0-3, 3 is fastest).
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.mouse.scaling
    type: float
    value: 3.0

- name: Set trackpad tracking speed (0-3, 3 is fastest).
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.trackpad.scaling
    type: float
    value: 3.0

- name: Set desktop wallpaper.
  command: >
    osascript -e 'tell application "Finder" to set desktop picture to
    POSIX file "/System/Library/Desktop Pictures/Solid Colors/{{ desktop_color }}.png"'
  changed_when: false
  when: desktop_color is defined and desktop_color | length > 0

- name: Add Development folder to Finder favorites.
  command: sfltool add-item com.apple.LSSharedFileList.FavoriteItems file://{{ ansible_env.HOME }}/Development/
  changed_when: false
  failed_when: false
